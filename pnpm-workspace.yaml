shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
  - tinyexec@1.2.2
packages:
  - 'apps/*'
  - 'packages/*'
overrides:
  fastify: 5.8.5
  ioredis: 5.10.1
  js-beautify>glob: 10.5.0
catalog:
  '@types/node': ^25.6.0
  dotenv: ^17.4.2
  fastify: 5.8.5
  ioredis: 5.10.1
  pino: ^10.3.1
  pino-pretty: ^13.1.3
  typescript: ^6.0.3
  zod: ^4.3.6
allowBuilds:
  '@google/genai': false
  '@nestjs/core': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@swc/core': true
  esbuild: true
  msgpackr-extract: true
  openclaw: false
  prisma: true
  protobufjs: false
  tree-sitter-bash: false
