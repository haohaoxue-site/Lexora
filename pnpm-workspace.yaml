shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
packages:
  - 'apps/*'
  - 'packages/*'
catalog:
  '@types/node': ^25.6.0
  dotenv: ^17.4.2
  fastify: 5.8.4
  ioredis: ^5.10.1
  pino: ^10.3.1
  pino-pretty: ^13.1.3
  typescript: ^6.0.3
  zod: ^4.3.6
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@parcel/watcher'
  - '@prisma/client'
  - '@prisma/engines'
  - '@scarf/scarf'
  - '@swc/core'
  - esbuild
  - prisma
