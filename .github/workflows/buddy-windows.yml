name: Buddy Windows Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check Buddy
        run: pnpm --filter @lexora/buddy type-check

      - name: Build NSIS installer
        run: pnpm --filter @lexora/buddy tauri build --ci --bundles nsis

      - name: Run Windows health smoke
        run: apps/buddy/src-tauri/target/release/lexora-buddy.exe --buddy-health-check

      - name: Write Windows readiness evidence
        env:
          LEXORA_BUDDY_EVIDENCE_KIND: windows-nsis-workflow
          LEXORA_BUDDY_EVIDENCE_OUTPUT: ${{ runner.temp }}/lexora-buddy-windows-nsis-evidence.json
          LEXORA_BUDDY_EVIDENCE_TEXT: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#buddy-windows-health-smoke
        run: node packaging/buddy/ci/write-readiness-evidence.mjs

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: lexora-buddy-windows-nsis
          path: apps/buddy/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows readiness evidence
        uses: actions/upload-artifact@v4
        with:
          name: lexora-buddy-windows-nsis-readiness-evidence
          path: ${{ runner.temp }}/lexora-buddy-windows-nsis-evidence.json
          if-no-files-found: error
