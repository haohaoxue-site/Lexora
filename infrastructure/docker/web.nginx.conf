map $http_x_forwarded_proto $lexora_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

map $http_x_forwarded_port $lexora_forwarded_port {
  default $http_x_forwarded_port;
  "" $server_port;
}

map $host $lexora_permissions_policy {
  default "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=()";
}

server {
  listen 80;
  server_name _;
  client_max_body_size 64m;

  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/css
    text/plain
    application/javascript
    application/json
    application/wasm
    application/xml
    image/svg+xml;

  location = /internal {
    return 404;
  }

  location /internal/ {
    return 404;
  }

  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-App-Internal-Key "";
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header CF-IPCountry $http_cf_ipcountry;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $lexora_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $lexora_forwarded_port;
    proxy_set_header X-Request-Id $request_id;
  }

  location /collab/ {
    proxy_pass http://collab:4100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-App-Internal-Key "";
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header CF-IPCountry $http_cf_ipcountry;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $lexora_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $lexora_forwarded_port;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /assets/ {
    try_files $uri =404;
    access_log off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy $lexora_permissions_policy always;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~ ^/icon-[^/]+\.svg$ {
    try_files $uri =404;
    access_log off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy $lexora_permissions_policy always;
    add_header Cache-Control "no-cache" always;
  }

  location = /index.html {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy $lexora_permissions_policy always;
    add_header Cache-Control "no-cache" always;
  }

  location / {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy $lexora_permissions_policy always;
    try_files $uri $uri/ @spa;
  }

  location @spa {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy $lexora_permissions_policy always;
    add_header Cache-Control "no-cache" always;
    try_files /index.html =404;
  }
}
