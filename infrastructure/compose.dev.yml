services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lexora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexora
      POSTGRES_USER: lexora_pg
      POSTGRES_PASSWORD: lexora_pg
    ports:
      - '5432:5432'
    volumes:
      - lexora-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d lexora']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: lexora-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - lexora-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  rustfs:
    image: rustfs/rustfs:latest
    container_name: lexora-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: admin
      RUSTFS_SECRET_KEY: password123
      RUSTFS_REGION: auto
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_VOLUMES: /data
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - lexora-rustfs-data:/data
      - lexora-rustfs-logs:/logs

volumes:
  lexora-postgres-data:
  lexora-redis-data:
  lexora-rustfs-data:
  lexora-rustfs-logs:
